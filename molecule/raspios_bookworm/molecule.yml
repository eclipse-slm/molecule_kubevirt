---
# Dependency management (download roles/collections)
dependency:
  name: galaxy
  options:
    ignore-certs: false
    ignore-errors: false
    role-file: requirements.yml
    requirements-file: requirements.yml

platforms:
  # Downloads image and creates a Volume based on Image
  - name: raspios-bookworm-01
    image: ghcr.io/ipa-big/kubevirt_containerdisk/raspios-bookworm-arm64-lite:2026-06-18
    arch: arm64
  # Clones alread existing Volume based on Golden Image
  - name: raspios-bookworm-01-golden-image
    golden_image: raspios-bookworm-arm64-lite
    arch: arm64
  # - name: raspios-bookworm-02
  #   image: ghcr.io/ipa-big/kubevirt_containerdisk/raspios-bookworm-arm64-lite:2026-06-18
  #   arch: arm64
  # - name: raspios-bookworm-03
  #   image: ghcr.io/ipa-big/kubevirt_containerdisk/raspios-bookworm-arm64-lite:2026-06-18
  #   arch: arm64


ansible:
  cfg:
    defaults:
      host_key_checking: false
      verbosity: 1
    ssh_connection:
      pipelining: true
  env:
    ANSIBLE_FORCE_COLOR: "1"
    ANSIBLE_LOAD_CALLBACK_PLUGINS: "1"

  executor:
    backend: ansible-playbook
    args:
      ansible_playbook:
        - --diff
        - --force-handlers
      ansible_navigator:
        - --mode stdout
        - --pull-policy missing
        - --execution-environment-image ghcr.io/ansible/community-ansible-dev-tools:latest

  playbooks:
    converge: ../default/converge.yml
    destroy: ../default/destroy.yml
    verify: ../default/verify.yml

scenario:
  name: raspios_bookworm
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
